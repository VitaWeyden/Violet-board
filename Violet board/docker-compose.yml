services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: violetboard_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www:cached
      - ./storage:/var/www/storage:delegated
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - violetboard

  nginx:
    image: nginx:alpine
    container_name: violetboard_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www:cached
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - violetboard

  db:
    image: postgres:15-alpine
    container_name: violetboard_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: violetboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - violetboard

volumes:
  pgdata:

networks:
  violetboard:
    driver: bridge
